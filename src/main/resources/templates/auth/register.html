<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — ParkEase</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="pk-auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="card pk-auth-card shadow-lg">
    <div class="card-body p-5">

        <div class="text-center mb-4">
            <div class="pk-logo-icon mx-auto mb-3">🅿️</div>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted small">Join ParkEase to book parking instantly</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form th:action="@{/auth/register}" method="post" th:object="${user}">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       placeholder="Priya Sharma" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control"
                       placeholder="you@example.com" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Phone Number</label>
                <input type="text" th:field="*{phone}" class="form-control"
                       placeholder="+91 98765 43210"/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Password</label>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="Min. 8 characters" required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">User Type</label>
                <select th:field="*{userType}" class="form-select">
                    <option value="TEMPORARY">Temporary User</option>
                    <option value="PERMANENT">Permanent / Monthly User</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Create Account →</button>
        </form>

        <p class="text-center small text-muted mt-4 mb-0">
            Already have an account?
            <a th:href="@{/auth/login}" class="text-warning fw-semibold">Sign In</a>
        </p>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
