<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — ParkEase</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="pk-auth-bg d-flex align-items-center justify-content-center min-vh-100">

<div class="card pk-auth-card shadow-lg">
    <div class="card-body p-5">

        <!-- Logo -->
        <div class="text-center mb-4">
    <h1 class="fw-bold text-warning">ParkEase</h1>
    <p class="text-muted small">Smart Parking System</p>
</div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success py-2 small" th:text="${message}"></div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email Address</label>
                <input type="email" name="username" class="form-control"
                       placeholder="you@example.com" required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Sign In →</button>
        </form>

        <hr class="my-4"/>

        <p class="text-center small text-muted mb-0">
            Don't have an account?
            <a th:href="@{/auth/register}" class="text-warning fw-semibold">Register here</a>
        </p>

        <!-- Demo credentials hint -->
        <div class="mt-3 p-2 bg-light rounded small text-muted text-center">
            <strong>Admin:</strong> admin@park.com / admin123
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
