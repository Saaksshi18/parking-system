<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Revenue — ParkEase</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="pk-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
    <div class="mb-4">
        <h3 class="fw-bold mb-1">Revenue Analytics 💰</h3>
        <p class="text-muted small mb-0">Financial overview of all completed bookings</p>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center py-4">
                <div style="font-size:32px">📅</div>
                <h5 class="fw-bold text-success mt-2">₹<span th:text="${#numbers.formatDecimal(todayRevenue,1,2)}">0</span></h5>
                <p class="text-muted small mb-0">Today's Revenue</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center py-4">
                <div style="font-size:32px">💰</div>
                <h5 class="fw-bold text-warning mt-2">₹<span th:text="${#numbers.formatDecimal(totalRevenue,1,2)}">0</span></h5>
                <p class="text-muted small mb-0">Total Revenue (All Time)</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center py-4">
                <div style="font-size:32px">📋</div>
                <h5 class="fw-bold text-primary mt-2" th:text="${#lists.size(allBookings)}">0</h5>
                <p class="text-muted small mb-0">Total Bookings</p>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h6 class="fw-bold mb-0">Completed Bookings Revenue Breakdown</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="pk-th">Booking ID</th>
                        <th class="pk-th">User</th>
                        <th class="pk-th">Slot</th>
                        <th class="pk-th">Date</th>
                        <th class="pk-th">Base</th>
                        <th class="pk-th">Penalty</th>
                        <th class="pk-th">Total</th>
                        <th class="pk-th">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${allBookings}">
                        <td><code th:text="'#BK-' + ${b.id}"></code></td>
                        <td th:text="${b.user.fullName}">—</td>
                        <td th:text="${b.parkingSlot.slotNumber}">—</td>
                        <td th:text="${#temporals.format(b.createdAt,'dd MMM yyyy')}">—</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(b.baseCost,1,2)}">—</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(b.penaltyAmount,1,2)}">—</td>
                        <td class="fw-bold text-success" th:text="'₹' + ${#numbers.formatDecimal(b.totalAmount,1,2)}">—</td>
                        <td>
                            <span th:class="${b.status.name() == 'ACTIVE'} ? 'badge bg-success' :
                                           (${b.status.name() == 'CANCELLED'} ? 'badge bg-danger' : 'badge bg-secondary')"
                                  th:text="${b.status}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(allBookings)}">
                        <td colspan="8" class="text-center text-muted py-4">No bookings yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
