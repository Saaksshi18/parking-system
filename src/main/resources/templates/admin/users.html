<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Users — ParkEase</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="pk-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
    <div class="mb-4">
        <h3 class="fw-bold mb-1">Registered Users 👥</h3>
        <p class="text-muted small mb-0">Manage user accounts and permissions</p>
    </div>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="pk-th">ID</th>
                        <th class="pk-th">Name</th>
                        <th class="pk-th">Email</th>
                        <th class="pk-th">Phone</th>
                        <th class="pk-th">Type</th>
                        <th class="pk-th">Role</th>
                        <th class="pk-th">Status</th>
                        <th class="pk-th">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td><code th:text="'#U-' + ${u.id}"></code></td>
                        <td th:text="${u.fullName}">—</td>
                        <td th:text="${u.email}">—</td>
                        <td th:text="${u.phone != null ? u.phone : '—'}">—</td>
                        <td>
                            <span th:class="${u.userType.name() == 'PERMANENT'} ? 'badge bg-primary' : 'badge bg-secondary'"
                                  th:text="${u.userType}"></span>
                        </td>
                        <td>
                            <span th:class="${u.role.name() == 'ROLE_ADMIN'} ? 'badge bg-warning text-dark' : 'badge bg-light text-dark'"
                                  th:text="${u.role}"></span>
                        </td>
                        <td>
                            <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                            <span th:unless="${u.enabled}" class="badge bg-danger">Suspended</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/users/toggle/{id}(id=${u.id})}"
                               th:class="${u.enabled} ? 'btn btn-outline-danger btn-sm' : 'btn btn-outline-success btn-sm'"
                               th:text="${u.enabled} ? 'Suspend' : 'Activate'"></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
