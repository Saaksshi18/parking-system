<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>All Bookings — ParkEase</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="pk-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
    <div class="mb-4">
        <h3 class="fw-bold mb-1">All Bookings 📋</h3>
        <p class="text-muted small mb-0">Complete booking log with overstay detection</p>
    </div>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="pk-th">ID</th>
                        <th class="pk-th">User</th>
                        <th class="pk-th">Slot</th>
                        <th class="pk-th">Vehicle No.</th>
                        <th class="pk-th">Start</th>
                        <th class="pk-th">End</th>
                        <th class="pk-th">Base</th>
                        <th class="pk-th">Penalty</th>
                        <th class="pk-th">Total</th>
                        <th class="pk-th">Status</th>
                        <th class="pk-th">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td><code th:text="'#BK-' + ${b.id}"></code></td>
                        <td th:text="${b.user.fullName}">—</td>
                        <td th:text="${b.parkingSlot.slotNumber}">—</td>
                        <td th:text="${b.vehicleNumber}">—</td>
                        <td th:text="${#temporals.format(b.startTime,'dd MMM HH:mm')}">—</td>
                        <td th:text="${#temporals.format(b.endTime,'dd MMM HH:mm')}">—</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(b.baseCost,1,2)}">—</td>
                        <td>
                            <span th:if="${b.penaltyAmount > 0}" class="text-danger fw-bold"
                                  th:text="'₹' + ${#numbers.formatDecimal(b.penaltyAmount,1,2)}"></span>
                            <span th:if="${b.penaltyAmount == 0}" class="text-muted">—</span>
                        </td>
                        <td class="fw-bold" th:text="'₹' + ${#numbers.formatDecimal(b.totalAmount,1,2)}">—</td>
                        <td>
                            <span th:class="${b.status.name() == 'ACTIVE'} ? 'badge bg-success' :
                                           (${b.status.name() == 'CANCELLED'} ? 'badge bg-danger' : 'badge bg-secondary')"
                                  th:text="${b.status}"></span>
                        </td>
                        <td>
                            <a th:if="${b.status.name() == 'ACTIVE'}"
                               th:href="@{/admin/bookings/cancel/{id}(id=${b.id})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('Cancel this booking?')">Cancel</a>
                            <span th:unless="${b.status.name() == 'ACTIVE'}" class="text-muted small">—</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="11" class="text-center text-muted py-4">No bookings yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
